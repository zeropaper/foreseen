    <style>
      html {
        min-height:100vh;
        max-height: 100vh;
        overflow: hidden;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      }
      body {
        margin:0;
        display: flex;
        height:100vh;
        width:100vw;
        flex-direction: column;
        max-height: 100vh;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: baseline;
        padding: 4px 8px;
        border-bottom: 1px solid #ccc;
      }
      header h1 {
        margin: 0;
        padding: 0;
        margin-right: 2rem;
      }
      main {
        margin:0;
        flex-grow:1;
        display: flex;
        width:100vw;
        justify-content:stretch;
        align-items:stretch
      }
      #canvasContainer {
        flex-grow: 1
      }
      #uiContainer {
        margin:0;
        display: flex;
        width:50%;
        max-height: 100%;
        max-width: 550px;
        justify-content:stretch;
        align-items:stretch;
        flex-direction: column;
        overflow: hidden;
        border-left: 1px solid #ccc;
      }
      #editorContainer {
        height: 70%;
        border-bottom: 1px solid #ccc;
      }
      #controlsContainer {
        font-family: monospace
      }
      #debugContainer {
        flex-grow:1;
        background:lightgray;
        font-family: monospace;
        white-space: pre-wrap;
        overflow: auto;
      }
      #input {
        display: none;
      }
    </style>
